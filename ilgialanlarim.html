    <main class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold main-title">İlgi Alanlarım</h1>
            <hr">
    </header>
            <p class="lead text-muted mt-3">TMDb API aracılığıyla güncel olarak listelenen favori içeriklerim.</p>
        </header>
        
        <!-- API Verilerinin Basılacağı Alan -->
        <div id="film-listesi" class="row g-4">
            <div class="d-flex justify-content-center py-5">
                <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Yükleniyor...</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-0">© 2026 - b251210093 | Tüm Hakları Saklıdır</p>
    </footer>

    <script>
        const API_KEY = '1bb378f29e1ef925f41f527e8550fefa'; 
        const url = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=tr-TR&page=1`;

        async function filmleriGetir() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const filmler = data.results.slice(0, 6); 
                
                const filmListesi = document.getElementById('film-listesi');
                filmListesi.innerHTML = ''; 

                filmler.forEach(film => {
                    const card = `
                        <div class="col-md-4">
                            <div class="card movie-card h-100">
                                <div class="position-relative">
                                    <img src="https://image.tmdb.org/t/p/w500${film.poster_path}" class="card-img-top movie-poster" alt="${film.title}">
                                    <span class="badge movie-rating position-absolute top-0 end-0 m-3">
                                        ⭐ ${film.vote_average.toFixed(1)}
                                    </span>
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title fw-bold text-dark">${film.title}</h5>
                                    <p class="card-text text-muted small flex-grow-1">
                                        ${film.overview ? film.overview.substring(0, 110) + '...' : 'İçerik özeti bulunamadı.'}
                                    </p>
                                    <div class="mt-auto border-top pt-3 text-secondary d-flex justify-content-between">
                                        <small><i class="bi bi-calendar3"></i> ${film.release_date.split('-')[0]}</small>
                                        <small class="text-uppercase fw-bold">Popüler</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    filmListesi.innerHTML += card;
                });
            } catch (error) {
                console.error("API hatası:", error);
                document.getElementById('film-listesi').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger shadow-sm text-center">
                            Veriler yüklenirken bir sorun oluştu. Lütfen bağlantınızı kontrol edin.
                        </div>
                    </div>
                `;
            }
        }

        window.onload = filmleriGetir;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
