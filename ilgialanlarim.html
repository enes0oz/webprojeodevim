<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Teknolojileri Projesi | İlgi Alanlarım</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kartların üzerine gelince hafif yükselme efekti */
        .card { transition: transform 0.3s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-10px); }
        .movie-poster { height: 450px; object-fit: cover; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Proje Ödevi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="takimimiz.html">Takımımız</a></li>
                    <li class="nav-item"><a class="nav-link active" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary btn-sm ms-lg-2 text-white" href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <header class="text-center mb-5">
            <h2 class="display-5 fw-bold">İlgi Alanlarım</h2>
            <p class="lead text-muted">Aşağıdaki filmler TMDb API kullanılarak canlı olarak çekilmektedir.</p>
        </header>
        
        <div id="film-listesi" class="row">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Yükleniyor...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Senin API Anahtarın yerleştirildi
        const API_KEY = '1bb378f29e1ef925f41f527e8550fefa'; 
        const url = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=tr-TR&page=1`;

        async function filmleriGetir() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const filmler = data.results.slice(0, 6); // İlk 6 popüler filmi al
                
                const filmListesi = document.getElementById('film-listesi');
                filmListesi.innerHTML = ''; // Spinner'ı temizle

                filmler.forEach(film => {
                    const card = `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="https://image.tmdb.org/t/p/w500${film.poster_path}" class="card-img-top movie-poster" alt="${film.title}">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title fw-bold">${film.title}</h5>
                                    <p class="card-text text-muted small flex-grow-1">
                                        ${film.overview ? film.overview.substring(0, 120) + '...' : 'Film açıklaması mevcut değil.'}
                                    </p>
                                    <div class="mt-auto d-flex justify-content-between align-items-center">
                                        <span class="badge bg-warning text-dark">⭐ ${film.vote_average.toFixed(1)}</span>
                                        <small class="text-secondary fw-bold">${film.release_date.split('-')[0]}</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    filmListesi.innerHTML += card;
                });
            } catch (error) {
                console.error("API hatası:", error);
                document.getElementById('film-listesi').innerHTML = `
                    <div class="alert alert-danger text-center">Veriler yüklenirken bir sorun oluştu. Lütfen API anahtarınızı veya internet bağlantınızı kontrol edin.</div>
                `;
            }
        }

        // Sayfa açıldığında fonksiyonu tetikle
        window.onload = filmleriGetir;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
