<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Proje Ödevi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div id="app">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Proje Ödevi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card contact-card shadow p-4 border-0">
                    <h2 class="mb-4 text-center">İletişim Formu</h2>
                    
                    <form id="contactForm">
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" v-model="formData.name" id="name" class="form-control" placeholder="Adınız Soyadınız">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" v-model="formData.email" id="email" class="form-control" placeholder="b251210093@sakarya.edu.tr">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefon</label>
                            <input type="text" v-model="formData.phone" id="phone" class="form-control" placeholder="0555XXXXXXX">
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="formData.gender" name="gender" value="Erkek">
                                <label class="form-check-label">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="formData.gender" name="gender" value="Kadın">
                                <label class="form-check-label">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Mesajınız</label>
                            <textarea v-model="formData.message" id="message" class="form-control" rows="3" placeholder="Mesajınızı buraya yazın..."></textarea>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="button" onclick="validateWithJS()" class="btn btn-warning fw-bold">
                                Vanilla JS ile Denetle
                            </button>
                            <button type="button" @click="validateWithVue" class="btn btn-primary fw-bold">
                                Vue.js Framework ile Denetle
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
